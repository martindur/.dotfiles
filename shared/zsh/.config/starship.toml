# Keep prompt work minimal for low latency and low overhead.
add_newline = false
scan_timeout = 10
command_timeout = 300

format = "$directory$git_branch$git_status$character"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

# Explicitly disable modules that frequently execute external commands.
[zig]
disabled = true
[nodejs]
disabled = true
